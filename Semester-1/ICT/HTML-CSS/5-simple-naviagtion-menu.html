<!DOCTYPE html>
<html>
<head>
    <title>Menu</title>
    <style>
        ul {
            list-style-type: none;
            background-color: black;
            padding: 10px;
        }
        li {
            display: inline;
            margin: 10px;
        }
        a {
            color: white;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">About</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</body>
</html>
