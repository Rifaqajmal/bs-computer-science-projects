<!DOCTYPE html>
<html>
<head>
    <title>Login Form</title>
    <style>
        form {
            width: 250px;
            margin: auto;
        }
        input {
            width: 100%;
            margin: 5px 0;
            padding: 5px;
        }
        button {
            width: 100%;
            background-color: green;
            color: white;
        }
    </style>
</head>

<body>
    <form>
        <h2>Login</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button>Login</button>
    </form>
</body>
</html>
