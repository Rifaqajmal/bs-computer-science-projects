<!DOCTYPE html>
<html>
<head>
    <title>Table</title>
    <style>
        table {
            width: 50%;
            border-collapse: collapse;
            margin: auto;
        }
        th, td {
            border: 1px solid black;
            padding: 8px;
            text-align: center;
        }
        th {
            background-color: gray;
            color: white;
        }
    </style>
</head>

<body>
    <table>
        <tr>
            <th>Name</th>
            <th>Course</th>
        </tr>
        <tr>
            <td>Rifaq</td>
            <td>CS</td>
        </tr>
        <tr>
            <td>Ali</td>
            <td>IT</td>
        </tr>
    </table>
</body>
</html>
